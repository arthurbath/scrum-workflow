<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrum Workflow</title>
  <style>
    :root {
      --bg: #f1f3f5;
      --surface-strong: #ffffff;
      --header-bg: #e6eaee;
      --text: #1d2433;
      --muted: #576175;
      --line: rgba(29, 36, 51, 0.12);
      --accent: #0d7a66;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", Verdana, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
    }

    .page {
      width: 100%;
      padding: 0 0 56px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: block;
      width: 100%;
      padding: 16px 24px 18px;
      margin-bottom: 18px;
      background: var(--header-bg);
      border-bottom: 1px solid #cfd5db;
    }

    .content {
      position: relative;
      min-height: calc(100vh - 120px);
      width: min(1600px, calc(100vw - 48px));
      margin: 0 auto;
    }

    .toolbar-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .toolbar-copy {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .toolbar-controls {
      width: 100%;
    }

    .diagram-nav {
      display: flex;
      width: 100%;
      border: 1px solid #c3cad1;
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
    }

    .diagram-nav-button {
      flex: 1 1 0;
      border: 0;
      border-right: 1px solid #c3cad1;
      background: #ffffff;
      color: var(--text);
      padding: 0.95rem 1rem;
      font: inherit;
      font-size: 0.9rem;
      line-height: 1.2;
      cursor: pointer;
    }

    .diagram-nav-button:last-child {
      border-right: 0;
    }

    .diagram-nav-button[aria-current="page"] {
      background: #d9ecff;
      color: #11263f;
    }

    .diagram-wrap {
      padding: 8px 0 24px;
      overflow: auto;
    }

    .diagram-stack {
      display: grid;
      gap: 28px;
    }

    .diagram-panel {
      display: grid;
      gap: 10px;
    }

    .diagram-panel-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .diagram-panel-copy {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .mermaid {
      min-width: 1200px;
      display: flex;
      justify-content: center;
      padding: 18px 0 32px;
    }

    .mermaid svg {
      overflow: visible;
    }

    .mermaid .labelBkg,
    .mermaid .edgeLabel rect {
      fill: #ffffff !important;
      fill-opacity: 1 !important;
      stroke: #cfd6dd !important;
      stroke-width: 1.5px !important;
      stroke-opacity: 1 !important;
      rx: 8;
      ry: 8;
    }

    .mermaid .edgeLabel text,
    .mermaid .nodeLabel {
      white-space: pre;
      line-height: 1.35;
    }

    .diagram-wrap.is-loading::after,
    .diagram-wrap.is-error::after {
      content: attr(data-status);
      display: block;
      padding: 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .diagram-wrap.is-loading .mermaid,
    .diagram-wrap.is-error .mermaid {
      display: none;
    }

    code {
      padding: 0.15rem 0.35rem;
      border-radius: 0.35rem;
      background: rgba(29, 36, 51, 0.06);
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 0.92em;
    }

    @media (max-width: 900px) {
      .page {
        padding-top: 0;
      }

      .toolbar {
        padding: 12px 16px 14px;
      }

      .diagram-nav {
        width: 100%;
        flex-direction: column;
      }

      .diagram-nav-button {
        border-right: 0;
        border-bottom: 1px solid #c3cad1;
      }

      .diagram-nav-button:last-child {
        border-bottom: 0;
      }

      .diagram-wrap {
        padding: 4px 0 16px;
      }

      .mermaid {
        min-width: 980px;
        padding: 12px 0 20px;
      }

      .diagram-stack {
        gap: 20px;
      }

      .content {
        width: calc(100vw - 24px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="toolbar">
      <div class="toolbar-controls">
        <nav class="diagram-nav" id="diagram-nav" aria-label="Diagram navigation"></nav>
      </div>
    </div>
    <section class="content" aria-label="Scrum workflow diagram">
      <div class="diagram-wrap is-loading" id="diagram-wrap" data-status="Loading diagram source from Markdown...">
        <div class="mermaid" id="diagram-render"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    mermaid.initialize({
      startOnLoad: true,
      htmlLabels: false,
      markdownAutoWrap: false,
      securityLevel: "loose",
      theme: "base",
      themeVariables: {
        background: "#fffdf9",
        primaryColor: "#ffffff",
        primaryTextColor: "#1d2433",
        primaryBorderColor: "#6d7b95",
        lineColor: "#49566c",
        tertiaryColor: "#eef1f4",
        clusterBkg: "#e7ebef",
        clusterBorder: "#8fa29d",
        fontFamily: "Trebuchet MS, Verdana, Arial, sans-serif",
        edgeLabelBackground: "#ffffff",
        cScale0: "#ea75da",
        cScale1: "#f8ef9a",
        cScale2: "#81e77b"
      },
      flowchart: {
        curve: "basis",
        useMaxWidth: false,
        wrappingWidth: 190,
        nodeSpacing: 56,
        rankSpacing: 72,
        padding: 16
      }
    });

    const manifestPath = "diagrams/manifest.json";
    const nav = document.getElementById("diagram-nav");
    const wrap = document.getElementById("diagram-wrap");
    const renderTarget = document.getElementById("diagram-render");

    function extractMermaidBlocks(markdown) {
      const matches = [...markdown.matchAll(/```mermaid\s*([\s\S]*?)```/gi)];
      return matches.map((match) => match[1].trim()).filter(Boolean);
    }

    function extractTitle(markdown) {
      const match = markdown.match(/^#\s+(.+)$/m);
      return match ? match[1].trim() : "";
    }

    function extractDescription(markdown) {
      const lines = markdown.split("\n").map((line) => line.trim());
      return lines.find((line) => line && !line.startsWith("#") && !line.startsWith("```")) || "";
    }

    function extractSectionTitles(markdown) {
      return [...markdown.matchAll(/^##\s+(.+)$/gm)].map((match) => match[1].trim());
    }

    function setStatus(kind, message) {
      wrap.classList.remove("is-loading", "is-error");
      if (kind) {
        wrap.classList.add(kind);
      }
      wrap.dataset.status = message;
    }

    function setActiveNav(activeId) {
      for (const button of nav.querySelectorAll("button")) {
        button.setAttribute("aria-current", button.dataset.diagramId === activeId ? "page" : "false");
      }
    }

    async function waitForRenderReadiness() {
      if (document.readyState !== "complete") {
        await new Promise((resolve) => window.addEventListener("load", resolve, { once: true }));
      }

      if (document.fonts?.ready) {
        await document.fonts.ready;
      }
    }

    let renderCount = 0;

    async function renderDiagram(entry) {
      setStatus("is-loading", `Loading ${entry.title}...`);
      setActiveNav(entry.id);

      try {
        await waitForRenderReadiness();

        const response = await fetch(entry.file);
        if (!response.ok) {
          throw new Error(`Unable to load ${entry.file} (${response.status})`);
        }

        const markdown = await response.text();
        const diagrams = extractMermaidBlocks(markdown);
        if (diagrams.length === 0) {
          throw new Error(`No Mermaid block found in ${entry.file}`);
        }

        const sectionTitles = extractSectionTitles(markdown);
        renderTarget.innerHTML = "";
        renderTarget.className = "diagram-stack";

        for (let index = 0; index < diagrams.length; index += 1) {
          const panel = document.createElement("section");
          panel.className = "diagram-panel";

          if (diagrams.length > 1) {
            const panelTitle = document.createElement("div");
            panelTitle.className = "diagram-panel-title";
            panelTitle.textContent = sectionTitles[index] || `Diagram ${index + 1}`;
            panel.appendChild(panelTitle);
          }

          const mermaidNode = document.createElement("div");
          mermaidNode.className = "mermaid";
          panel.appendChild(mermaidNode);
          renderTarget.appendChild(panel);

          const { svg, bindFunctions } = await mermaid.render(`diagram-${renderCount++}`, diagrams[index]);
          mermaidNode.innerHTML = svg;
          if (typeof bindFunctions === "function") {
            bindFunctions(mermaidNode);
          }
        }

        setStatus("", "");
      } catch (error) {
        setStatus("is-error", `${error.message}. If you opened this page with file://, serve the repo over HTTP or use GitHub Pages.`);
      }
    }

    async function boot() {
      try {
        const response = await fetch(manifestPath);
        if (!response.ok) {
          throw new Error(`Unable to load ${manifestPath}`);
        }

        const entries = await response.json();
        if (!Array.isArray(entries) || entries.length === 0) {
          throw new Error("No diagrams are listed in the manifest.");
        }

        for (const entry of entries) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "diagram-nav-button";
          button.dataset.diagramId = entry.id;
          button.textContent = entry.title;
          button.addEventListener("click", () => renderDiagram(entry));
          nav.appendChild(button);
        }

        const defaultEntry = entries.find((entry) => entry.id === "original-story-status-workflow") || entries[0];
        renderDiagram(defaultEntry);
      } catch (error) {
        setStatus("is-error", `${error.message}. If you opened this page with file://, serve the repo over HTTP or use GitHub Pages.`);
      }
    }

    boot();
  </script>
</body>
</html>
